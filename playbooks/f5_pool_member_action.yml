    #     pool: "{{ f5_pool }}"
    #     partition: "{{ f5_partition }}"
    #     # El name viene como 'nodo:puerto', separamos ambos
    #     name: "{{ item.split(':')[0] }}"
    #     port: "{{ item.split(':')[1] }}"
