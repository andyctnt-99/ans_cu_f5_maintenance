---
- name: F5 - Gestión de Pool Members
  hosts: "{{ f5_target_host }}"
  gather_facts: false
  connection: httpapi

  vars:
    provider:
      server: '{{ ansible_host }}'
      user: '{{ ansible_user }}'
      password: '{{ ansible_password }}'
      server_port: 443
      validate_certs: false
      no_f5_teem: true

  tasks:

    # ── 1. Obtener todos los members del pool ──────────────────────────────────
    - name: Obtener info de todos los pool members
      f5networks.f5_modules.bigip_pool_member_info:
        pool: "{{ f5_pool }}"
        partition: "{{ f5_partition }}"
        provider: "{{ provider }}"
      register: pool_info

    # ── 2. Construir lista de members a afectar ────────────────────────────────
    - name: Determinar lista de members a actuar
      set_fact:
        # Si el filtro está vacío → todos los members descubiertos
        # Si tiene valor        → solo los del filtro (split por coma)
        members_to_act: >-
          {{
            pool_info.members | map(attribute='name') | list
            if pool_members_filter == ""
            else pool_members_filter.split(',') | map('trim') | list
          }}

    - name: "[INFO] Members que serán afectados"
      debug:
        msg: "Acción '{{ f5_action }}' sobre: {{ members_to_act }}"

    # # ── 3. Aplicar acción sobre cada member ───────────────────────────────────
