    #     provider:
    #       server: "{{ ansible_host }}"
    #       user: "{{ ansible_user }}"
    #       password: "{{ ansible_password }}"
    #       validate_certs: false
    #   loop: "{{ members_to_act }}"
    #   loop_control:
    #     label: "{{ item }}"

